name: AGIX Daily Signal Check

on:
  schedule:
    # UTC 14:35 = 米国東部夏時間(EDT, UTC-4)で 10:35 → 市場オープン(9:30 ET)の少し後
    # 冬時間(EST, UTC-5)の時期は 9:35 ET になる。年2回の時刻調整が気になる場合は
    # 手動でこの時刻を変更してください（詳しくは README参照）。
    - cron: "35 14 * * 1-5"  # 月-金のみ
  workflow_dispatch: {}  # GitHub上の「Run workflow」ボタンで手動実行も可能

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal checker
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python signal_checker.py
